<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>{{title}} — Property Brochure</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet" />

<style>
  :root {
    --paper: #f3efe6;
    --paper-2: #ebe5d7;
    --ink: #1c1f1a;
    --ink-soft: #4a4d44;
    --ink-mute: #8a8a7e;
    --rule: #c9c2b1;
    --accent: #2d3b2c;       /* deep forest */
    --accent-2: #6b5a3e;     /* warm bronze */
    --berry: #8a3a3a;        /* heliconia red, used sparingly */
    --page-w: 794px;         /* A4 @ 96dpi */
    --page-h: 1123px;
    --margin: 56px;
  }

  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    background: #d6d1c4;
    font-family: 'Inter', system-ui, sans-serif;
    color: var(--ink);
    -webkit-font-smoothing: antialiased;
    font-feature-settings: "ss01", "cv11";
    padding: 32px 0 80px;
  }

  /* Page shell */
  .deck { display: flex; flex-direction: column; align-items: center; gap: 28px; }
  .page {
    width: var(--page-w);
    height: var(--page-h);
    background: var(--paper);
    position: relative;
    overflow: hidden;
    box-shadow: 0 1px 0 rgba(0,0,0,.04), 0 30px 60px -30px rgba(0,0,0,.25);
    color: var(--ink);
  }
  .page-inner {
    position: absolute;
    inset: var(--margin);
    display: flex;
    flex-direction: column;
  }

  /* Running header / footer */
  .runhead, .runfoot {
    position: absolute;
    left: var(--margin); right: var(--margin);
    display: flex; justify-content: space-between; align-items: center;
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    letter-spacing: .14em;
    text-transform: uppercase;
    color: var(--ink-mute);
  }
  .runhead { top: 28px; }
  .runfoot { bottom: 28px; }
  .runhead .dot, .runfoot .dot { width: 4px; height: 4px; border-radius: 50%; background: var(--accent); display: inline-block; margin: 0 8px; vertical-align: middle; }

  /* Type */
  .display {
    font-family: 'Cormorant Garamond', 'Times New Roman', serif;
    font-weight: 400;
    line-height: 0.95;
    letter-spacing: -0.01em;
    color: var(--ink);
  }
  .eyebrow {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    letter-spacing: .22em;
    text-transform: uppercase;
    color: var(--accent);
  }
  .body {
    font-size: 13px;
    line-height: 1.65;
    color: var(--ink-soft);
    text-wrap: pretty;
  }
  /* Editorial in-line highlight for body prose across all pages. Heliconia
     red strong enough to pop against ink-soft body without shouting.
     Page-specific overrides (e.g. .ts-body em) can refine per-context. */
  .body em { color: var(--berry); font-style: normal; font-weight: 600; }
  .small {
    font-size: 11px;
    line-height: 1.55;
    color: var(--ink-soft);
  }
  .label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 9.5px;
    letter-spacing: .18em;
    text-transform: uppercase;
    color: var(--ink-mute);
  }
  .num {
    font-family: 'Cormorant Garamond', serif;
    font-weight: 300;
    line-height: 1;
  }
  .mono { font-family: 'JetBrains Mono', monospace; }

  hr.rule { border: 0; border-top: 1px solid var(--rule); margin: 0; }

  /* === COVER === */
  .cover { background: var(--paper); }
  /* Fallback when the cover hero is missing (e.g. property has no
     portrait photo): the section's --accent background plus the vignette
     gradient looks intentional and editorial, not broken. */
  .cover-hero {
    position: absolute; inset: 0;
    background-color: var(--accent);
    background-size: cover; background-position: center;
  }
  .cover-vignette {
    position: absolute; inset: 0;
    background:
      linear-gradient(180deg, rgba(15,20,12,.55) 0%, rgba(15,20,12,.15) 28%, rgba(15,20,12,.08) 55%, rgba(15,20,12,.78) 100%);
  }
  .cover-frame {
    position: absolute; inset: 28px;
    border: 1px solid rgba(243,239,230,.45);
    pointer-events: none;
  }
  .cover-content {
    position: absolute; inset: 0;
    padding: 56px;
    display: flex; flex-direction: column; justify-content: space-between;
    color: #f3efe6;
  }
  .cover-top { display: flex; justify-content: space-between; align-items: flex-start; }
  .cover-mark {
    font-family: 'Cormorant Garamond', serif;
    font-weight: 400;
    font-style: italic;
    font-size: 22px;
    line-height: 1;
  }
  .cover-mark span { display: block; font-style: normal; font-family: 'JetBrains Mono', monospace; font-size: 9px; letter-spacing: .28em; text-transform: uppercase; margin-top: 8px; opacity: .8; }
  .cover-meta {
    text-align: right;
    font-family: 'JetBrains Mono', monospace;
    font-size: 9.5px;
    letter-spacing: .22em;
    text-transform: uppercase;
    line-height: 1.9;
    opacity: .85;
  }
  .cover-title {
    font-family: 'Cormorant Garamond', serif;
    font-weight: 300;
    font-size: 96px;
    line-height: 0.92;
    letter-spacing: -0.015em;
  }
  .cover-title em { font-style: italic; font-weight: 300; color: #e7dcc4; }
  .cover-sub {
    margin-top: 18px;
    font-family: 'Inter', sans-serif;
    font-weight: 300;
    font-size: 14px;
    letter-spacing: .02em;
    max-width: 460px;
    color: rgba(243,239,230,.85);
  }
  .cover-bottom { display: flex; justify-content: space-between; align-items: flex-end; }
  .cover-tag {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    letter-spacing: .22em;
    text-transform: uppercase;
    opacity: .85;
  }
  .cover-tag .bar { display: inline-block; width: 28px; height: 1px; background: currentColor; vertical-align: middle; margin-right: 12px; opacity: .7; }

  /* === GLANCE === */
  .glance-hd {
    display: grid; grid-template-columns: 1fr auto; align-items: end; gap: 24px;
    padding-bottom: 22px; border-bottom: 1px solid var(--rule);
  }
  .glance-hd h1 {
    margin: 12px 0 0;
    font-family: 'Cormorant Garamond', serif;
    font-weight: 300;
    font-size: 56px;
    line-height: 0.95;
    letter-spacing: -0.01em;
  }
  .glance-hd h1 em { font-style: italic; color: var(--accent); }
  .glance-hd .pageno { font-family: 'JetBrains Mono', monospace; font-size: 10px; letter-spacing: .2em; color: var(--ink-mute); }

  .price-row {
    margin-top: 28px;
    display: grid; grid-template-columns: 1.2fr 1fr; gap: 32px;
    align-items: start;
  }
  .price-block .label { margin-bottom: 10px; }
  .price-figure {
    font-family: 'Cormorant Garamond', serif;
    font-weight: 300;
    font-size: 64px;
    line-height: 0.95;
    letter-spacing: -0.01em;
    color: var(--ink);
  }
  .price-figure .ccy {
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    letter-spacing: .14em;
    color: var(--accent);
    display: inline-block;
    transform: translateY(-22px);
    margin-right: 6px;
  }
  .price-meta { font-size: 12px; color: var(--ink-mute); margin-top: 8px; font-family: 'JetBrains Mono', monospace; letter-spacing: .12em; text-transform: uppercase; }
  .blurb {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-weight: 400;
    font-size: 18px;
    line-height: 1.45;
    color: var(--ink-soft);
  }

  .facts {
    margin-top: 40px;
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    border-top: 1px solid var(--rule);
  }
  .fact {
    padding: 20px 14px 18px 18px;
    border-right: 1px solid var(--rule);
  }
  .fact:first-child { padding-left: 0; }
  .fact:last-child { border-right: 0; padding-right: 0; }
  .fact .label { margin-bottom: 14px; }
  .fact .val {
    font-family: 'Cormorant Garamond', serif;
    font-weight: 400;
    font-size: 30px;
    line-height: 1;
    color: var(--ink);
  }
  .fact .val small {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    letter-spacing: .14em;
    color: var(--ink-mute);
    display: block;
    margin-top: 8px;
    text-transform: uppercase;
  }

  .glance-body {
    margin-top: 38px;
    display: grid; grid-template-columns: 2fr 1.1fr; gap: 40px;
  }
  .glance-body h2 {
    margin: 0 0 14px;
    font-family: 'Cormorant Garamond', serif;
    font-weight: 400;
    font-size: 24px;
    line-height: 1.1;
    color: var(--ink);
  }
  .glance-body p + p { margin-top: 12px; }
  .keylist { list-style: none; margin: 0; padding: 0; }
  .keylist li {
    display: grid; grid-template-columns: 80px 1fr; gap: 14px;
    padding: 10px 0; border-bottom: 1px dashed var(--rule);
    font-size: 12px; color: var(--ink-soft);
  }
  .keylist li:first-child { border-top: 1px dashed var(--rule); }
  .keylist .k {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    letter-spacing: .16em;
    text-transform: uppercase;
    color: var(--ink-mute);
    padding-top: 2px;
  }

  /* === LOCATION === */
  .loc { display: grid; grid-template-rows: auto auto 1fr auto; gap: 24px; height: 100%; }
  .loc h1 {
    margin: 6px 0 0;
    font-family: 'Cormorant Garamond', serif;
    font-weight: 300;
    font-size: 60px;
    line-height: 0.95;
    letter-spacing: -0.01em;
  }
  .loc h1 em { font-style: italic; color: var(--accent); }
  .loc-intro { max-width: 460px; }
  /* minmax(0,…) prevents grid items' default min-width:auto from blowing
     the columns wider than 1.15fr/1fr — without it long place names in the
     "Within reach" list overflow the page. */
  .loc-grid { display: grid; grid-template-columns: minmax(0, 1.15fr) minmax(0, 1fr); gap: 28px; }
  .map-card {
    background: var(--paper-2);
    padding: 22px;
    position: relative;
    aspect-ratio: 1 / 1.05;
  }
  .map-card .label { position: absolute; top: 18px; left: 22px; }
  /* coords + scale share a single flex row beneath the map frame so they
     can't overlap each other. (Was previously position:absolute → collided
     with .map-coords text in the same corner.) */
  .map-meta {
    display: flex; justify-content: space-between; align-items: baseline;
    margin-top: 8px; gap: 16px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 7.5px; letter-spacing: .12em; color: var(--ink-mute); text-transform: uppercase;
    white-space: nowrap;
  }
  .map-meta > span { white-space: nowrap; }
  .map-meta .scale { flex-shrink: 0; }
  .map-svg { width: 100%; height: 100%; display: block; }

  .nearby {
    list-style: none; margin: 0; padding: 0;
  }
  .nearby li {
    display: grid; grid-template-columns: 28px 1fr auto; gap: 14px;
    align-items: baseline;
    padding: 12px 0;
    border-bottom: 1px solid var(--rule);
  }
  .nearby li:first-child { border-top: 1px solid var(--rule); }
  .nearby .n {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px; color: var(--accent); letter-spacing: .12em;
  }
  .nearby .name { font-size: 13px; color: var(--ink); }
  .nearby .name span { display: block; color: var(--ink-mute); font-size: 11px; margin-top: 2px; }
  .nearby .dist {
    font-family: 'Cormorant Garamond', serif;
    font-weight: 400;
    font-size: 22px;
    color: var(--ink);
    line-height: 1;
  }
  .nearby .dist small {
    font-family: 'JetBrains Mono', monospace;
    font-size: 9.5px;
    letter-spacing: .14em;
    color: var(--ink-mute);
    margin-left: 4px;
  }

  /* === PAGE 3 ALTERNATIVES — Within reach (no map) === */
  .page-inner.wr h1 {
    margin: 6px 0 0;
    font-family: 'Cormorant Garamond', serif;
    font-weight: 300;
    font-size: 60px;
    line-height: 0.95;
    letter-spacing: -0.01em;
  }
  .page-inner.wr h1 em { font-style: italic; color: var(--accent); }
  .wr-hero { max-width: 540px; }
  .wr-intro { margin-top: 14px; max-width: 480px; }
  .nearby-grand { margin-top: 56px; flex-grow: 1; display: flex; flex-direction: column; }
  .nearby-grand .label { padding-bottom: 12px; border-bottom: 1px solid var(--rule); }
  .nearby-grand ul { list-style: none; margin: 0; padding: 0; }
  .nearby-grand li {
    display: grid; grid-template-columns: 40px 1fr auto;
    gap: 24px; align-items: baseline;
    padding: 22px 0; border-bottom: 1px solid var(--rule);
  }
  .nearby-grand .n {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px; letter-spacing: .12em; color: var(--accent);
  }
  .nearby-grand .name {
    font-family: 'Cormorant Garamond', serif;
    font-weight: 400; font-size: 26px; color: var(--ink); line-height: 1.1;
  }
  .nearby-grand .name span {
    display: block; margin-top: 6px;
    font-family: 'Inter', sans-serif; font-weight: 300;
    font-size: 13px; line-height: 1.5; color: var(--ink-soft);
  }
  .nearby-grand .dist {
    font-family: 'Cormorant Garamond', serif;
    font-weight: 400; font-size: 32px; color: var(--ink); line-height: 1;
    white-space: nowrap;
  }
  .nearby-grand .dist small {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px; letter-spacing: .14em; color: var(--ink-mute);
    margin-left: 4px;
  }
  .wr-foot {
    margin-top: 28px; padding-top: 18px;
    border-top: 1px solid var(--rule); max-width: 480px;
  }

  /* === PAGE 3 ALTERNATIVES — Photo essay === */
  .page-inner.pe h1 {
    margin: 6px 0 0;
    font-family: 'Cormorant Garamond', serif;
    font-weight: 300;
    font-size: 60px;
    line-height: 0.95;
    letter-spacing: -0.01em;
  }
  .page-inner.pe h1 em { font-style: italic; color: var(--accent); }
  .pe-hero { max-width: 540px; }
  .pe-essay { margin-top: 32px; flex-grow: 1; display: flex; flex-direction: column; gap: 28px; }
  .pe-block { display: grid; grid-template-columns: 1.7fr 1fr; gap: 28px; align-items: stretch; }
  .pe-block.reverse { grid-template-columns: 1fr 1.7fr; }
  .pe-block.reverse .pe-photo { order: 2; }
  .pe-block.reverse .pe-cap { order: 1; }
  .pe-photo {
    height: 240px;
    background-size: cover; background-position: center;
    background-color: var(--paper-2);
  }
  .pe-cap { display: flex; flex-direction: column; justify-content: center; padding: 6px 4px; }
  .pe-cap .label { color: var(--accent); }
  .pe-cap h3 {
    margin: 10px 0 8px;
    font-family: 'Cormorant Garamond', serif;
    font-weight: 400; font-size: 22px; line-height: 1.15; color: var(--ink);
  }
  .pe-cap h3 em { font-style: italic; color: var(--accent); }
  .pe-cap p { margin: 0; font-size: 12px; line-height: 1.6; color: var(--ink-soft); }

  /* === PAGE 3 ALTERNATIVES — The setting === */
  .page-inner.ts h1 {
    margin: 6px 0 0;
    font-family: 'Cormorant Garamond', serif;
    font-weight: 300;
    font-size: 60px;
    line-height: 0.95;
    letter-spacing: -0.01em;
  }
  .page-inner.ts h1 em { font-style: italic; color: var(--accent); }
  .ts-hero { max-width: 540px; }
  .ts-body {
    margin-top: 48px; max-width: 540px;
    font-family: 'Cormorant Garamond', serif;
    font-style: italic; font-weight: 400;
    font-size: 24px; line-height: 1.5; color: var(--ink-soft);
    text-wrap: pretty;
  }
  .ts-body p + p { margin-top: 24px; }
  /* Same berry-red highlight as the rest of the body prose. Italic is kept
     because the surrounding prose is already italic. */
  .ts-body em { color: var(--berry); font-style: italic; font-weight: 500; }
  .ts-rule { margin: 56px 0 28px; border: 0; border-top: 1px solid var(--rule); }
  .ts-facts {
    display: grid; grid-template-columns: repeat(4, 1fr); gap: 0;
    border-top: 1px solid var(--rule); border-bottom: 1px solid var(--rule);
  }
  .ts-facts .fact { padding: 22px 18px 22px 22px; border-right: 1px solid var(--rule); }
  .ts-facts .fact:first-child { padding-left: 0; }
  .ts-facts .fact:last-child { border-right: 0; padding-right: 0; }
  .ts-facts .label { margin-bottom: 10px; }
  .ts-facts .val {
    font-family: 'Cormorant Garamond', serif;
    font-weight: 400; font-size: 22px; color: var(--ink); line-height: 1.1;
  }
  .ts-facts .val span {
    display: block; margin-top: 6px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px; letter-spacing: .14em;
    color: var(--ink-mute); text-transform: uppercase;
  }
  .ts-bottom {
    margin-top: auto; max-width: 520px; color: var(--ink-mute);
  }

  /* === PAGE 3 ALTERNATIVES — Provenance === */
  .page-inner.pv h1 {
    margin: 6px 0 0;
    font-family: 'Cormorant Garamond', serif;
    font-weight: 300;
    font-size: 60px;
    line-height: 0.95;
    letter-spacing: -0.01em;
  }
  .page-inner.pv h1 em { font-style: italic; color: var(--accent); }
  /* Hero now spans the full page-inner width — the photo no longer crowds
     the headline. Title can break naturally instead of being forced into a
     narrow 460px column. */
  .pv-hero { max-width: 880px; }
  /* Middle band: prose on the left, photo inset on the right. The photo
     stretches to match the prose column height so they bottom-align. */
  .pv-mid {
    margin-top: 32px;
    display: grid;
    grid-template-columns: 1fr 280px;
    gap: 48px;
    align-items: stretch;
  }
  .pv-photo {
    width: 280px;
    min-height: 340px;
    background-size: cover;
    background-position: center;
    background-color: var(--paper-2);
    filter: saturate(0.95) contrast(1.02);
  }
  /* When no photo data URI is supplied the empty background-image collapses
     to the placeholder paper colour — layout stays intact. */
  .pv-body {
    max-width: 480px;
    font-size: 14px; line-height: 1.85; color: var(--ink-soft);
    text-wrap: pretty;
  }
  .pv-body p { margin: 0 0 18px 0; }
  .pv-body p:last-child { margin-bottom: 0; }
  /* Closing single-sentence beat — italic, slightly larger, set apart from
     the body block. Keeps the page's last word visually significant. */
  .pv-close {
    margin: 28px 0 0;
    max-width: 720px;
    font-family: 'Cormorant Garamond', serif;
    font-weight: 400;
    font-style: italic;
    font-size: 20px;
    line-height: 1.5;
    color: var(--ink);
  }
  /* Editorial highlight: heliconia red (the brochure's "berry" accent),
     applied to <em> tags inside body prose. Strong enough to pop against
     ink-soft body text, restrained enough to read editorial. */
  .pv-body em { color: var(--berry); font-style: normal; font-weight: 600; }
  .pv-close em { color: var(--berry); font-style: italic; font-weight: 500; }
  .pv-timeline {
    margin-top: 48px;
    border-top: 1px solid var(--rule); border-bottom: 1px solid var(--rule);
    padding: 22px 0;
    display: grid; grid-template-columns: repeat(4, 1fr); gap: 0;
  }
  .pv-step { padding: 4px 18px 4px 22px; border-right: 1px solid var(--rule); }
  .pv-step:first-child { padding-left: 0; }
  .pv-step:last-child { border-right: 0; padding-right: 0; }
  .pv-step .label { margin-bottom: 10px; display: flex; align-items: center; gap: 8px; }
  .pv-step .label::before {
    content: ''; width: 8px; height: 8px; border-radius: 50%;
    background: var(--accent); display: inline-block;
  }
  .pv-step .val {
    font-family: 'Cormorant Garamond', serif;
    font-weight: 400; font-size: 28px; line-height: 1; color: var(--ink);
  }
  .pv-step .val span {
    display: block; margin-top: 8px;
    font-family: 'Inter', sans-serif; font-weight: 300;
    font-size: 11px; line-height: 1.4; color: var(--ink-mute);
  }
  .pv-bottom {
    margin-top: auto; padding-top: 28px;
    border-top: 1px solid var(--rule); max-width: 660px;
  }

  /* === SITE PLAN === */
  .site h1 {
    margin: 6px 0 0;
    font-family: 'Cormorant Garamond', serif;
    font-weight: 300;
    font-size: 52px;
    line-height: 0.95;
    letter-spacing: -0.01em;
  }
  .site h1 em { font-style: italic; color: var(--accent); }
  .site-grid {
    margin-top: 28px;
    display: grid;
    /* minmax(0,…) overrides grid items' default min-width:auto so the SVG
       can't blow out the left column and push specs off-page. */
    grid-template-columns: minmax(0, 1.4fr) minmax(0, 1fr);
    gap: 32px;
  }
  .siteplan {
    background: var(--paper-2);
    padding: 22px;
    aspect-ratio: 1 / 1;
    position: relative;
  }
  .siteplan .label { position: absolute; top: 18px; left: 22px; }
  .siteplan .compass {
    position: absolute; top: 18px; right: 22px;
    font-family: 'JetBrains Mono', monospace; font-size: 10px; color: var(--ink-mute);
    display: flex; align-items: center; gap: 6px;
  }
  .siteplan svg { width: 100%; height: 100%; display: block; }
  /* Uploaded site/floor plan image — preserves natural aspect ratio inside
     the panel, with a slight desaturation so colour drawings still feel
     editorial against the cream paper. */
  .siteplan-img {
    width: 100%;
    height: 100%;
    object-fit: contain;
    display: block;
    filter: saturate(0.85) contrast(1.04);
  }
  .siteplan-empty {
    width: 100%; height: 100%;
    display: flex; align-items: center; justify-content: center;
    text-align: center; padding: 24px;
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-size: 14px;
    color: var(--ink-mute);
  }

  .specs { display: flex; flex-direction: column; gap: 0; }
  .specs h2 {
    font-family: 'Cormorant Garamond', serif;
    font-weight: 400;
    font-size: 24px;
    margin: 0 0 14px;
  }
  .spectable { width: 100%; border-collapse: collapse; }
  .spectable td {
    padding: 9px 0;
    border-bottom: 1px solid var(--rule);
    font-size: 12px;
    vertical-align: top;
  }
  .spectable tr:first-child td { border-top: 1px solid var(--rule); }
  .spectable .k {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    letter-spacing: .16em;
    text-transform: uppercase;
    color: var(--ink-mute);
    width: 38%;
    padding-top: 13px;
  }
  .spectable .v { color: var(--ink); }
  .spectable .v em { font-style: italic; color: var(--ink-mute); display: block; font-size: 11px; margin-top: 2px; }

  /* === GALLERY === */
  .gallery h1 {
    margin: 6px 0 0;
    font-family: 'Cormorant Garamond', serif;
    font-weight: 300;
    font-size: 60px;
    line-height: 0.95;
    letter-spacing: -0.01em;
  }
  .gallery h1 em { font-style: italic; color: var(--accent); }
  .gallery-intro { max-width: 460px; margin-top: 10px; }
  /* The grid layout adapts to the number of photo tiles. Each tile carries
     its own grid-column/grid-row span via inline style from the assembler.
     Auto-rows + count-specific column count gives clean fit without empty
     slots. */
  .gallery-grid {
    margin-top: 24px;
    display: grid;
    gap: 10px;
  }
  /* Row-based masonry gallery. The assembler emits .gallery-row elements
     with explicit pixel height and per-photo width percentages. Tile
     aspect ratio equals the photo's natural aspect ratio by construction,
     so images fill their tiles edge-to-edge — no cropping, no whitespace.
     Inter-row gap kept tight enough that 3-row layouts don't push the
     footer; horizontal photo-to-photo gap is generous so the row breathes. */
  .gallery-grid.masonry {
    display: flex;
    flex-direction: column;
    gap: 28px;
  }

  /* Page 5 layout: natural top-down flow (intro, gallery, closing pull-quote).
     The "additional photography" footnote is pinned to the bottom via
     margin-top:auto so the closing pull-quote sits comfortably between
     the gallery and the page edge. */
  .page-inner.gallery > .small {
    margin-top: auto;
  }
  .gallery-intro {
    max-width: 560px;
  }
  .gallery-grid.masonry {
    margin-top: 28px;
  }

  /* Closing pull-quote — editorial flex. The closing paragraph is rendered
     as a large italic serif quote: indented, with decorative quote marks,
     comfortably-spaced. Visually fills the area below the gallery without
     needing extra content, and gives page 5 a final editorial beat. */
  .gallery-closing {
    margin: 32px 0 0;
    padding: 0 56px 0 80px;
    font-family: 'Cormorant Garamond', 'Times New Roman', serif;
    font-style: italic;
    font-weight: 400;
    font-size: 26px;
    line-height: 1.35;
    letter-spacing: -0.005em;
    color: var(--ink-soft);
    text-wrap: pretty;
    position: relative;
  }
  .gallery-closing::before {
    content: "“";
    position: absolute;
    left: 16px;
    top: -8px;
    font-family: 'Cormorant Garamond', 'Times New Roman', serif;
    font-style: normal;
    font-weight: 300;
    font-size: 80px;
    line-height: 1;
    color: var(--accent);
    opacity: 0.45;
  }
  .gallery-closing::after {
    content: "”";
    position: absolute;
    right: 24px;
    bottom: -28px;
    font-family: 'Cormorant Garamond', 'Times New Roman', serif;
    font-style: normal;
    font-weight: 300;
    font-size: 80px;
    line-height: 1;
    color: var(--accent);
    opacity: 0.45;
  }
  .gallery-grid.masonry .gallery-row {
    display: flex;
    gap: 14px;
    width: 100%;
    /* Centred so any row that didn't fill 100% (because MAX_ROW_H kicked
       in for a single tall photo) sits balanced on the page. */
    justify-content: center;
  }
  .gallery-grid.masonry .ph {
    height: 100%;
    /* width comes from inline style: width: NN%; */
    overflow: hidden;
    position: relative;
  }
  .gallery-grid.masonry .ph img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }
  .ph {
    position: relative;
    overflow: hidden;
    background-color: var(--paper-2);
    background-size: cover;
    background-position: center;
  }
  /* Caption overlay only renders when data-cap is non-empty — empty
     attribute selector keeps the dark pill from showing on untitled tiles. */
  .ph[data-cap]:not([data-cap=""])::after {
    content: attr(data-cap);
    position: absolute;
    left: 12px; bottom: 10px;
    right: 12px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 9px;
    letter-spacing: .18em;
    text-transform: uppercase;
    color: rgba(243,239,230,.92);
    background: rgba(20,24,16,.45);
    padding: 4px 8px;
    backdrop-filter: blur(2px);
    /* Long captions should wrap cleanly inside the overlay rather than
       overflow the tile. */
    white-space: normal;
    line-height: 1.4;
    max-width: calc(100% - 24px);
    width: fit-content;
  }

  /* === TERMS / CONTACT === */
  /* 4 rows: heading · terms (1fr fills middle) · contact card · disclaim.
     padding-bottom on the grid pushes the whole stack up so the disclaim
     row sits well above the runfoot with breathing room. */
  .closing {
    display: grid;
    grid-template-rows: auto 1fr auto auto;
    gap: 20px;
    height: 100%;
    padding-bottom: 110px;
  }
  .closing h1 {
    margin: 6px 0 0;
    font-family: 'Cormorant Garamond', serif;
    font-weight: 300;
    font-size: 60px;
    line-height: 0.95;
    letter-spacing: -0.01em;
  }
  .closing h1 em { font-style: italic; color: var(--accent); }

  .terms-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 36px; margin-top: 8px; }
  .terms-grid h2 {
    font-family: 'Cormorant Garamond', serif;
    font-weight: 400;
    font-size: 22px;
    margin: 0 0 12px;
  }
  .terms-grid p { font-size: 12px; line-height: 1.65; color: var(--ink-soft); }
  .terms-grid .keylist li { grid-template-columns: 100px 1fr; }

  .contact-card {
    margin-top: 8px;
    background: var(--accent);
    color: #f3efe6;
    padding: 28px 36px;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 28px;
    position: relative;
  }
  .contact-card .eyebrow { color: rgba(243,239,230,.65); }
  .contact-card h3 {
    font-family: 'Cormorant Garamond', serif;
    font-weight: 300;
    font-size: 32px;
    line-height: 1;
    margin: 10px 0 0;
    letter-spacing: -0.01em;
  }
  .contact-card h3 em { font-style: italic; color: #e7dcc4; }
  .contact-card .info {
    font-size: 12px;
    line-height: 1.85;
    color: rgba(243,239,230,.92);
  }
  .contact-card .info b { font-weight: 500; color: #fff; }
  .contact-card .info .label2 {
    font-family: 'JetBrains Mono', monospace;
    font-size: 9.5px;
    letter-spacing: .2em;
    text-transform: uppercase;
    color: rgba(243,239,230,.55);
    display: block;
    margin-top: 10px;
  }
  .contact-card .info .label2:first-child { margin-top: 0; }

  .disclaim {
    margin: 0;
    font-family: 'JetBrains Mono', monospace;
    font-size: 7.5px;
    letter-spacing: .08em;
    line-height: 1.5;
    color: var(--ink-mute);
    text-transform: uppercase;
  }

  /* Print */
  @media print {
    body { background: #fff; padding: 0; }
    .deck { gap: 0; }
    .page { box-shadow: none; page-break-after: always; }
    .page:last-child { page-break-after: auto; }
  }
  @page { size: A4; margin: 0; }

  /* Edit mode pill */
  .edit-hint {
    position: fixed; top: 14px; right: 14px;
    background: var(--accent); color: #f3efe6;
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    letter-spacing: .14em;
    text-transform: uppercase;
    padding: 8px 12px;
    border-radius: 999px;
    z-index: 100;
    opacity: .85;
  }

  /* === Map block (brochure-themed embed of a real static map) === */
  .map-frame {
    position: relative;
    margin-top: 12px;
    background: var(--paper-2);
    border: 1px solid var(--rule);
    aspect-ratio: 1 / 1.05;
    overflow: hidden;
  }
  .map-img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    /* outdoors-v12 base style brings the landscape colours (blue water,
       green vegetation, beige/brown terrain). Filter is intentionally
       gentle: slight saturation drop + tiny contrast lift so the map sits
       elegantly against the cream paper without feeling like a screenshot. */
    filter: saturate(0.9) contrast(1.04);
  }
  .map-n {
    position: absolute; top: 10px; right: 12px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 9px;
    letter-spacing: .2em;
    color: var(--accent);
    background: rgba(243, 239, 230, 0.85);
    border: 1px solid var(--rule);
    padding: 4px 7px;
  }
  .map-coords {
    margin-top: 8px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 8.5px;
    letter-spacing: .14em;
    color: var(--ink-mute);
    text-transform: uppercase;
  }

  /* === PDF / Puppeteer overrides === */
  @page { size: A4; margin: 0; }
  body { background: #fff !important; padding: 0 !important; }
  .deck { gap: 0 !important; }
  .page { box-shadow: none !important; break-after: page; page-break-after: always; }
  .page:last-of-type { break-after: auto; page-break-after: auto; }
</style>
</head>
<body>

<div class="deck" id="deck">
{{PAGES}}
</div>

</body>
</html>
